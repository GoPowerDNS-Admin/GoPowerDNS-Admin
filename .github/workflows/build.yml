name: Build and Test
run-name: Build and Test - ${{ github.event.pull_request.title }} by ${{ github.event.pull_request.user.login }}
on:
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  validate-pr-title:
    name: Validate PR Title
    runs-on: ["self-hosted", "Linux"]
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: amannn/action-semantic-pull-request@800da4c97f618e44f972ff9bc21ab5daecc97773 # v6.1.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            docs
            test
            ci
            chore

  build:
    name: Build
    needs: validate-pr-title
    runs-on: ["self-hosted", "Linux"]
    container:
      image: golang:1.26.4-bookworm
      env:
        GOPATH: /github/workspace/go
        GOCACHE: /github/workspace/go-cache
        PRE_COMMIT_HOME: /github/workspace/pre-commit-cache
      volumes:
        - /var/cache/go-mod:/github/workspace/go/pkg/mod
        - /var/cache/go-build:/github/workspace/go-cache
        - /var/cache/pre-commit:/github/workspace/pre-commit-cache
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v5

      - name: Install dependencies
        run: |
          apt-get update && apt-get install -y git nodejs python3-pip
          pip3 install pre-commit --break-system-packages
          go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.11.4
          echo "/github/workspace/go/bin" >> $GITHUB_PATH

      - name: Configure git safe directory
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Run pre-commit checks
        run: pre-commit run --all-files

      - name: Build
        run: go build -v ./...
        env:
          CGO_ENABLED: "0"

      - name: Test
        run: go test ./...
        env:
          CGO_ENABLED: "0"

  browser-tests:
    name: Browser Tests
    needs: validate-pr-title
    runs-on: ["self-hosted", "Linux"]
    container:
      image: golang:1.26.4-bookworm
      env:
        GOPATH: /github/workspace/go
        GOCACHE: /github/workspace/go-cache
      volumes:
        - /var/cache/go-mod:/github/workspace/go/pkg/mod
        - /var/cache/go-build:/github/workspace/go-cache
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v5

      - name: Install dependencies
        run: apt-get update && apt-get install -y chromium

      - name: Configure git safe directory
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Run browser tests
        run: go test -tags browser -v ./internal/web/
        env:
          CGO_ENABLED: "0"
          CI: "true"
