name: Build

on:
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-pr-title:
    name: Validate PR Title
    runs-on: ["self-hosted", "Linux"]
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: amannn/action-semantic-pull-request@800da4c97f618e44f972ff9bc21ab5daecc97773 # v6.1.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            docs
            test
            ci
            chore

  build:
    name: Build
    needs: validate-pr-title
    runs-on: ["self-hosted", "Linux"]
    container:
      image: golang:1.25-bookworm
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v5

      - name: Install dependencies
        run: apt-get update && apt-get install -y gcc libsqlite3-dev git nodejs python3-pip && pip3 install pre-commit --break-system-packages

      - name: Configure git safe directory
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Run pre-commit checks
        run: pre-commit run --all-files

      - name: Build
        run: go build -v ./...
        env:
          CGO_ENABLED: "1"

      - name: Test
        run: go test ./...
        env:
          CGO_ENABLED: "1"
