name: Demo Reset

on:
  schedule:
    - cron: "0 0 * * *" # daily at midnight UTC
  workflow_dispatch:

jobs:
  reset:
    name: Restart demo app
    runs-on: ubuntu-latest
    steps:
      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Restart app
        run: flyctl apps restart go-powerdns-admin
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_DEMO_API_TOKEN }}
