name: Nightly Build

on:
  schedule:
    - cron: "0 0 * * *" # Daily at midnight UTC
  workflow_dispatch: # Allow manual trigger

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux / amd64
            goos: linux
            goarch: amd64
            artifact: gopowerdns-admin-linux-amd64
          - name: Linux / arm64
            goos: linux
            goarch: arm64
            artifact: gopowerdns-admin-linux-arm64
          - name: Linux / armv7
            goos: linux
            goarch: arm
            goarm: "7"
            artifact: gopowerdns-admin-linux-armv7
          - name: macOS / amd64
            goos: darwin
            goarch: amd64
            artifact: gopowerdns-admin-darwin-amd64
          - name: macOS / arm64
            goos: darwin
            goarch: arm64
            artifact: gopowerdns-admin-darwin-arm64
          - name: FreeBSD / amd64
            goos: freebsd
            goarch: amd64
            artifact: gopowerdns-admin-freebsd-amd64
          - name: FreeBSD / aarch64
            goos: freebsd
            goarch: arm64
            artifact: gopowerdns-admin-freebsd-aarch64

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          GOARM: ${{ matrix.goarm }}
          CGO_ENABLED: "0"
        run: |
          mkdir -p dist
          go build -v \
            -ldflags="-s -w -X github.com/GoPowerDNS-Admin/GoPowerDNS-Admin/internal/version.version=$(git describe --tags --always --dirty) -X github.com/GoPowerDNS-Admin/GoPowerDNS-Admin/internal/version.branch=${{ github.ref_name }}" \
            -o dist/${{ matrix.artifact }} \
            .

      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}
          retention-days: 7
