name: Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.1.0-alpha.1)"
        required: true

env:
  RELEASE_TAG: ${{ github.event.release.tag_name || github.event.inputs.tag }}

jobs:
  prepare:
    name: Prepare
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
    steps:
      - id: tag
        env:
          RAW_TAG: ${{ github.event.release.tag_name || github.event.inputs.tag }}
        run: |
          TAG="${RAW_TAG// /}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

  build:
    name: ${{ matrix.name }}
    needs: prepare
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ needs.prepare.outputs.tag }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux / amd64
            goos: linux
            goarch: amd64
            artifact: gopowerdns-admin-linux-amd64
          - name: Linux / arm64
            goos: linux
            goarch: arm64
            artifact: gopowerdns-admin-linux-arm64
          - name: Linux / armv7
            goos: linux
            goarch: arm
            goarm: "7"
            artifact: gopowerdns-admin-linux-armv7
          - name: macOS / amd64
            goos: darwin
            goarch: amd64
            artifact: gopowerdns-admin-darwin-amd64
          - name: macOS / arm64
            goos: darwin
            goarch: arm64
            artifact: gopowerdns-admin-darwin-arm64
          - name: FreeBSD / amd64
            goos: freebsd
            goarch: amd64
            artifact: gopowerdns-admin-freebsd-amd64
          - name: FreeBSD / aarch64
            goos: freebsd
            goarch: arm64
            artifact: gopowerdns-admin-freebsd-aarch64

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          GOARM: ${{ matrix.goarm }}
          CGO_ENABLED: "0"
        run: |
          mkdir -p dist
          go build -v \
            -ldflags="-s -w -X github.com/GoPowerDNS-Admin/GoPowerDNS-Admin/internal/version.version=${{ env.RELEASE_TAG }} -X github.com/GoPowerDNS-Admin/GoPowerDNS-Admin/internal/version.branch=${{ env.RELEASE_TAG }}" \
            -o dist/${{ matrix.artifact }} \
            .

      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}
          retention-days: 1

  build-docker:
    name: Docker / multi-platform
    needs: prepare
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ needs.prepare.outputs.tag }}
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v5

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository_owner }}/gopowerdns-admin
          tags: |
            type=raw,value=${{ env.RELEASE_TAG }}
            type=raw,value=latest,enable=${{ !contains(env.RELEASE_TAG, '-alpha') && !contains(env.RELEASE_TAG, '-beta') && !contains(env.RELEASE_TAG, '-rc') }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          push: true
          build-args: |
            VERSION=${{ env.RELEASE_TAG }}
          tags: ${{ steps.meta.outputs.tags }}

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [prepare, build]
    env:
      RELEASE_TAG: ${{ needs.prepare.outputs.tag }}
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0 # full history required by git-cliff

      - name: Generate release notes
        if: github.event_name == 'workflow_dispatch'
        uses: orhun/git-cliff-action@v4
        id: cliff
        with:
          config: cliff.toml
          args: --verbose --latest --strip header
        env:
          OUTPUT: RELEASE_NOTES.md

      - name: Update CHANGELOG.md
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --verbose
        env:
          OUTPUT: CHANGELOG.md

      - name: Commit updated CHANGELOG.md
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet CHANGELOG.md && exit 0
          BRANCH="chore/changelog-${{ env.RELEASE_TAG }}"
          git checkout -b "$BRANCH"
          git add CHANGELOG.md
          git commit -m "chore(changelog): update for ${{ env.RELEASE_TAG }} [skip ci]"
          git push origin --delete "$BRANCH" 2>/dev/null || true
          git push origin "$BRANCH" || true
          gh pr create \
            --title "chore(changelog): update for ${{ env.RELEASE_TAG }}" \
            --body "Automated changelog update generated by the release workflow." \
            --base main \
            --head "$BRANCH" || true

      - name: Download all artifacts
        uses: actions/download-artifact@v7
        with:
          path: dist/
          pattern: gopowerdns-admin-*
          merge-multiple: true

      - name: Create release
        if: github.event_name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PRERELEASE=""
          if echo "${{ env.RELEASE_TAG }}" | grep -qE '-(alpha|beta|rc)'; then
            PRERELEASE="--prerelease"
          fi
          gh release create "${{ env.RELEASE_TAG }}" \
            --title "${{ env.RELEASE_TAG }}" \
            --notes-file RELEASE_NOTES.md \
            $PRERELEASE

      - name: Upload artifacts
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ env.RELEASE_TAG }}" dist/* --clobber
