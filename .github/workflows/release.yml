name: Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.1.0-alpha.1)"
        required: true

env:
  RELEASE_TAG: ${{ github.event.release.tag_name || github.event.inputs.tag }}

jobs:
  prepare:
    name: Prepare
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
    steps:
      - id: tag
        env:
          RAW_TAG: ${{ github.event.release.tag_name || github.event.inputs.tag }}
        run: |
          TAG="${RAW_TAG// /}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

  build-linux:
    name: Linux / ${{ matrix.arch }}
    needs: prepare
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ needs.prepare.outputs.tag }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            goarch: amd64
            cc: gcc
          - arch: arm64
            goarch: arm64
            cc: aarch64-linux-gnu-gcc
          - arch: armv7
            goarch: arm
            goarm: "7"
            cc: arm-linux-gnueabihf-gcc

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Install cross-compilers
        run: |
          sudo apt-get update
          case "${{ matrix.arch }}" in
            arm64) sudo apt-get install -y gcc-aarch64-linux-gnu ;;
            armv7) sudo apt-get install -y gcc-arm-linux-gnueabihf ;;
          esac

      - name: Build
        env:
          GOOS: linux
          GOARCH: ${{ matrix.goarch }}
          GOARM: ${{ matrix.goarm }}
          CC: ${{ matrix.cc }}
          CGO_ENABLED: "1"
        run: |
          mkdir -p dist
          go build -v \
            -ldflags="-s -w -X github.com/GoPowerDNS-Admin/GoPowerDNS-Admin/internal/version.version=${{ env.RELEASE_TAG }} -X github.com/GoPowerDNS-Admin/GoPowerDNS-Admin/internal/version.branch=${{ env.RELEASE_TAG }}" \
            -o dist/gopowerdns-admin-linux-${{ matrix.arch }} \
            .

      - uses: actions/upload-artifact@v6
        with:
          name: gopowerdns-admin-linux-${{ matrix.arch }}
          path: dist/
          retention-days: 1

  build-darwin:
    name: macOS / amd64 + arm64
    needs: prepare
    runs-on: macos-latest
    env:
      RELEASE_TAG: ${{ needs.prepare.outputs.tag }}
    strategy:
      fail-fast: false

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Build arm64
        env:
          GOOS: darwin
          GOARCH: arm64
          CGO_ENABLED: "1"
        run: |
          mkdir -p dist
          go build -v \
            -ldflags="-s -w -X github.com/GoPowerDNS-Admin/GoPowerDNS-Admin/internal/version.version=${{ env.RELEASE_TAG }} -X github.com/GoPowerDNS-Admin/GoPowerDNS-Admin/internal/version.branch=${{ env.RELEASE_TAG }}" \
            -o dist/gopowerdns-admin-darwin-arm64 \
            .

      - name: Build amd64 (cross-compile via universal Clang)
        env:
          GOOS: darwin
          GOARCH: amd64
          CGO_ENABLED: "1"
          CC: "clang -arch x86_64"
          CGO_CFLAGS: "-arch x86_64"
          CGO_LDFLAGS: "-arch x86_64"
        run: |
          go build -v \
            -ldflags="-s -w -X github.com/GoPowerDNS-Admin/GoPowerDNS-Admin/internal/version.version=${{ env.RELEASE_TAG }} -X github.com/GoPowerDNS-Admin/GoPowerDNS-Admin/internal/version.branch=${{ env.RELEASE_TAG }}" \
            -o dist/gopowerdns-admin-darwin-amd64 \
            .

      - uses: actions/upload-artifact@v6
        with:
          name: gopowerdns-admin-darwin
          path: dist/gopowerdns-admin-darwin-*
          retention-days: 1

  build-freebsd:
    name: FreeBSD / ${{ matrix.arch }}
    needs: prepare
    runs-on: ${{ matrix.runs-on }}
    env:
      RELEASE_TAG: ${{ needs.prepare.outputs.tag }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runs-on: ubuntu-latest
          - arch: aarch64
            runs-on: ubuntu-24.04-arm

    steps:
      - uses: actions/checkout@v5

      - name: Build inside FreeBSD VM
        uses: vmactions/freebsd-vm@v1.4.3
        with:
          arch: ${{ matrix.arch }}
          usesh: true
          prepare: |
            pkg install -y go sqlite3 rsync
          run: |
            mkdir -p dist
            go build -v \
              -ldflags="-s -w -X github.com/GoPowerDNS-Admin/GoPowerDNS-Admin/internal/version.version=${{ env.RELEASE_TAG }} -X github.com/GoPowerDNS-Admin/GoPowerDNS-Admin/internal/version.branch=${{ env.RELEASE_TAG }}" \
              -o dist/gopowerdns-admin-freebsd-${{ matrix.arch }} \
              .

      - uses: actions/upload-artifact@v6
        with:
          name: gopowerdns-admin-freebsd-${{ matrix.arch }}
          path: dist/
          retention-days: 1

  build-docker:
    name: Docker / multi-platform
    needs: prepare
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ needs.prepare.outputs.tag }}
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v5

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository_owner }}/gopowerdns-admin
          tags: |
            type=raw,value=${{ env.RELEASE_TAG }}
            type=raw,value=latest,enable=${{ !contains(env.RELEASE_TAG, '-alpha') && !contains(env.RELEASE_TAG, '-beta') && !contains(env.RELEASE_TAG, '-rc') }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          push: true
          build-args: |
            VERSION=${{ env.RELEASE_TAG }}
          tags: ${{ steps.meta.outputs.tags }}

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [prepare, build-linux, build-darwin, build-freebsd]
    env:
      RELEASE_TAG: ${{ needs.prepare.outputs.tag }}
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0 # full history required by git-cliff

      - name: Generate release notes
        if: github.event_name == 'workflow_dispatch'
        uses: orhun/git-cliff-action@v4
        id: cliff
        with:
          config: cliff.toml
          args: --verbose --latest --strip header
        env:
          OUTPUT: RELEASE_NOTES.md

      - name: Update CHANGELOG.md
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --verbose
        env:
          OUTPUT: CHANGELOG.md

      - name: Commit updated CHANGELOG.md
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet CHANGELOG.md && exit 0
          BRANCH="chore/changelog-${{ env.RELEASE_TAG }}"
          git checkout -b "$BRANCH"
          git add CHANGELOG.md
          git commit -m "chore(changelog): update for ${{ env.RELEASE_TAG }} [skip ci]"
          git push origin --delete "$BRANCH" 2>/dev/null || true
          git push origin "$BRANCH"
          gh pr create \
            --title "chore(changelog): update for ${{ env.RELEASE_TAG }}" \
            --body "Automated changelog update generated by the release workflow." \
            --base main \
            --head "$BRANCH" || true

      - name: Download all artifacts
        uses: actions/download-artifact@v6
        with:
          path: dist/
          merge-multiple: true

      - name: Create release
        if: github.event_name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PRERELEASE=""
          if echo "${{ env.RELEASE_TAG }}" | grep -qE '-(alpha|beta|rc)'; then
            PRERELEASE="--prerelease"
          fi
          gh release create "${{ env.RELEASE_TAG }}" \
            --title "${{ env.RELEASE_TAG }}" \
            --notes-file RELEASE_NOTES.md \
            $PRERELEASE

      - name: Upload artifacts
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ env.RELEASE_TAG }}" dist/* --clobber
