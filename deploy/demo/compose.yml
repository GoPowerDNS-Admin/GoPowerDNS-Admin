services:
  pdns:
    image: docker.io/powerdns/pdns-auth-49:latest
    restart: unless-stopped
    ports:
      - "5353:53"
      - "5353:53/udp"
    command:
      - "--webserver=yes"
      - "--webserver-address=0.0.0.0"
      - "--webserver-port=8081"
      - "--webserver-allow-from=0.0.0.0/0"
      - "--api=yes"
      - "--api-key=${PDNS_KEY}"
      - "--default-soa-edit=INCEPTION-INCREMENT"

  app:
    image: ghcr.io/gopowerdns-admin/gopowerdns-admin:v0.1.0-alpha.2
    restart: unless-stopped
    depends_on:
      - pdns
    ports:
      - "8080:8080" # HTTP — HAProxy on pfSense terminates TLS externally
    volumes:
      - ./config:/etc/go-pdns:ro
      - ./data:/var/lib/go-pdns
    environment:
      GPDNS_WEBSERVER_URL: "https://${DOMAIN}"
      GPDNS_WEBSERVER_DOMAIN: "${DOMAIN}"
      GPDNS_WEBSERVER_COOKIEENCRYPTIONKEY: "${COOKIE_KEY}"
      GPDNS_WEBSERVER_ARGON2SALT: "${ARGON2_SALT}"
      GPDNS_PDNS_APISERVERURL: "${PDNS_URL:-http://pdns:8081}"
      GPDNS_PDNS_APIKEY: "${PDNS_KEY:-}"
      GPDNS_PDNS_VHOST: "${PDNS_VHOST:-localhost}"
