app = "go-powerdns-admin"
primary_region = "ams"

[build]
  dockerfile = "deploy/fly/Dockerfile"

[env]
  GPDNS_WEBSERVER_URL    = "https://go-powerdns-admin.fly.dev"
  GPDNS_WEBSERVER_DOMAIN = "go-powerdns-admin.fly.dev"

[http_service]
  internal_port        = 8080
  force_https          = true
  auto_stop_machines   = "stop"
  auto_start_machines  = true
  min_machines_running = 1

[[vm]]
  size   = "shared-cpu-1x"
  memory = "256mb"
