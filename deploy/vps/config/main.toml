Title = "GO PowerDNS-Admin Demo"

[webserver]
# Secrets injected via .env:
#   GPDNS_WEBSERVER_COOKIEENCRYPTIONKEY
#   GPDNS_WEBSERVER_ARGON2SALT
CookieEncryptionKey = ""
Argon2Salt          = ""
Port                = 8080
URL                 = "https://example.com"   # overridden by GPDNS_WEBSERVER_URL
Domain              = "example.com"           # overridden by GPDNS_WEBSERVER_DOMAIN

ACMEEnabled  = true
ACMEDomain   = "example.com"                 # overridden by GPDNS_WEBSERVER_ACMEDOMAIN
ACMEEmail    = "admin@example.com"           # overridden by GPDNS_WEBSERVER_ACMEEMAIL
ACMECacheDir = "/var/lib/go-pdns/acme-cache"

[webserver.session]
ExpiryTime = "24h"

# SQLite on a bind-mounted directory — easy to wipe for demo resets.
[DB]
GormEngine = "sqlite"
Name       = "/var/lib/go-pdns/go-pdns.db"

[log]
Level = "info"

[log.Console]
Enable = true

[auth.LocalDB]
enabled = true

# PowerDNS server bootstrap — seeded into the DB on first startup.
# Set via .env: PDNS_URL, PDNS_KEY, PDNS_VHOST
[pdns]
APIServerURL = ""
APIKey       = ""
VHost        = ""
