baseURL: "https://docs.gopowerdnsadmin.org/"
title: "GoPowerDNS-Admin"
languageCode: "en-US"

enableRobotsTXT: true
enableGitInfo: true

module:
  imports:
    - path: github.com/imfing/hextra
  hugoVersion:
    min: "0.140.0"

outputs:
  home:
    - HTML
    - RSS
    - JSON
  page:
    - HTML

markup:
  goldmark:
    renderer:
      unsafe: true
  highlight:
    noClasses: false

params:
  description: "Web-based administration UI for PowerDNS, written in Go."

  # Default Open Graph / social-share image (used when a page sets no images).
  # TODO: replace with a proper 1200x630 PNG card — SVG is poorly supported by
  # most social/search crawlers, so previews may not render until then.
  images:
    - img/powerdns_logo_icon.svg

  navbar:
    displayTitle: true
    displayLogo: true
    logo:
      path: img/powerdns_logo_icon.svg
      width: 28
      height: 28

  theme:
    default: system
    displayToggle: true

  search:
    enable: true
    type: flexsearch

  highlight:
    copy:
      enable: true
      display: hover

  editURL:
    enable: true
    base: "https://github.com/GoPowerDNS-Admin/GoPowerDNS-Admin/edit/main/docs/content"

  footer:
    enable: true
    displayCopyright: true
    displayPoweredBy: false

  displayUpdatedDate: true
  dateFormat: "January 2, 2006"

  comments:
    enable: false

menu:
  main:
    - name: Docs
      pageRef: /docs
      weight: 1
    - name: Demo
      url: "https://demo.gopowerdnsadmin.org/login"
      weight: 2
      params:
        type: "external"
    - name: GitHub
      url: "https://github.com/GoPowerDNS-Admin/GoPowerDNS-Admin"
      weight: 3
      params:
        icon: github
